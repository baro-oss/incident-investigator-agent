<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập — Investigation Agent</title>
  <link rel="stylesheet" href="/dashboard/static/style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .login-logo { text-align:center; margin-bottom:1.5rem; }
    .login-logo h1 { font-size:1.3rem; color:var(--accent); margin:0; }
    .login-logo p  { color:var(--text-muted); font-size:.85rem; margin:.3rem 0 0; }
    .login-field { margin-bottom:1rem; }
    .login-field label { display:block; font-size:.8rem; color:var(--text-muted); margin-bottom:.4rem; }
    .login-field input {
      width:100%; padding:.55rem .8rem; border-radius:6px;
      border:1px solid var(--border); background:var(--bg);
      color:var(--text); font-size:.9rem; box-sizing:border-box;
    }
    .login-field input:focus { outline:none; border-color:var(--accent); }
    .login-btn {
      width:100%; padding:.65rem; border-radius:6px;
      background:var(--accent); color:#fff; border:none;
      font-size:.95rem; cursor:pointer; margin-top:.5rem;
    }
    .login-btn:hover { opacity:.9; }
    .login-error {
      background: rgba(220,20,60,.15); border:1px solid #dc143c;
      border-radius:6px; padding:.6rem .9rem; margin-bottom:1rem;
      font-size:.85rem; color:#ff6b6b;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <h1>Investigation Agent</h1>
      <p>v1.4 · Phase 14</p>
    </div>

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/auth/login">
      <input type="hidden" name="next" value="{{ next or '/dashboard' }}">
      <div class="login-field">
        <label>Tên đăng nhập</label>
        <input type="text" name="username" autofocus autocomplete="username" required>
      </div>
      <div class="login-field">
        <label>Mật khẩu</label>
        <input type="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn">Đăng nhập</button>
    </form>
  </div>
  <script>
    (function(){
      var t = localStorage.getItem('ia-theme') || 'light';
      if (t === 'light') document.body.classList.add('theme-light');
    })();
  </script>
</body>
</html>
