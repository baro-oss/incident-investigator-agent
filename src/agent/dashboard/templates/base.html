<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Investigation Agent{% endblock %}</title>
  <link rel="stylesheet" href="/dashboard/static/style.css">
</head>
<body>
<div class="layout">
  <nav>
    <div class="logo">
      Investigation Agent
      <span>v0.6 · Phase 3</span>
    </div>
    <a href="/dashboard" class="{{ 'active' if active == 'home' }}">
      <span class="ico">⚡</span> Investigations
    </a>
    <a href="/dashboard/trigger" class="{{ 'active' if active == 'trigger' }}">
      <span class="ico">▶</span> Trigger
    </a>
    <a href="/dashboard/projects" class="{{ 'active' if active == 'projects' }}">
      <span class="ico">◈</span> Projects
    </a>
    <a href="/dashboard/chat" class="{{ 'active' if active == 'chat' }}">
      <span class="ico">💬</span> Chat
    </a>
    <a href="/dashboard/eval" class="{{ 'active' if active == 'eval' }}">
      <span class="ico">📊</span> Eval Results
    </a>
    <a href="/docs" target="_blank">
      <span class="ico">⊞</span> API Docs
    </a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
