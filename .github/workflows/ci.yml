name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test suite + eval gate (${{ matrix.db_backend }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        db_backend: [sqlite, postgres]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: investigation
          POSTGRES_USER: agent
          POSTGRES_PASSWORD: agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agent -d investigation"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_BACKEND: ${{ matrix.db_backend }}
      DATABASE_URL: ${{ matrix.db_backend == 'postgres' && 'postgresql://agent:agent@localhost/investigation' || '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          if [ "$DB_BACKEND" = "postgres" ]; then
            pip install -e ".[postgres]"
          fi

      # ── Syntax check ───────────────────────────────────────────────────────
      - name: Syntax check — py_compile all .py files
        run: |
          find src scripts tests data mcp_server -name "*.py" \
            | xargs python -m py_compile
          echo "Syntax OK"

      # ── Import smoke ───────────────────────────────────────────────────────
      - name: Core import check
        run: |
          python -c "
          import agent.engine.loop
          import agent.engine.state
          import agent.engine.calibration
          import agent.engine.hypothesis_catalog
          import agent.engine.specificity
          import agent.engine.multi_agent
          import agent.engine.graph
          import agent.memory.patterns
          import agent.tools.registry
          import agent.tools.code_distill
          import agent.tools.get_code_diff
          import agent.tools.mcp_client
          import agent.intake.server
          import agent.intake.runner
          import agent.output.telegram
          print('Core imports OK')
          "

      # ── Database setup ─────────────────────────────────────────────────────
      - name: Init DB + seed data
        run: |
          python data/init_db.py
          python data/migrate_projects.py
          python data/migrate_fintech.py
          python data/migrate_day53.py
          python data/migrate_day54.py
          python data/seed_scenario1.py
          python data/seed_scenario2.py
          python data/seed_scenario3.py
          python data/seed_scenario4.py

      # ── pytest ─────────────────────────────────────────────────────────────
      - name: pytest
        run: pytest --tb=short -q

      # ── Coverage (display only — no threshold gate) ────────────────────────
      - name: Coverage report
        run: pytest --cov=agent --cov-report=term-missing -q
        continue-on-error: true

      # ── Eval gate (SQLite only — mock eval không phụ thuộc backend) ────────
      - name: Mock eval gate — all scenarios PASS
        if: matrix.db_backend == 'sqlite'
        run: python scripts/eval_agent.py --mock --n 3 --scenario all
