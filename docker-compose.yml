version: "3.9"

services:
  agent:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      PORT: "8080"
    volumes:
      # Persist SQLite DB khi dev (PG prod không cần volume này)
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  mcp-server:
    build: .
    command: python scripts/start_mcp_server.py
    ports:
      - "9000:9000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    profiles:
      - mcp  # chỉ bật khi: docker compose --profile mcp up

  # Postgres local dev (Phase 11 Tier-2)
  # Bật: docker compose --profile postgres up -d postgres
  # Sau đó: DB_BACKEND=postgres DATABASE_URL=postgresql://agent:agent@localhost/investigation python data/init_db.py
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: investigation
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d investigation"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles:
      - postgres  # chỉ bật khi: docker compose --profile postgres up

volumes:
  pgdata:
