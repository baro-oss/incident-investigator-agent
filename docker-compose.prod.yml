# docker-compose.prod.yml — Stack production (app + PostgreSQL)
# Dùng để test local với đầy đủ stack trước khi deploy lên AgentBase.
#
# Cách dùng:
#   cp .env.example .env.prod   # điền secrets
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Sau khi stack lên, init DB:
#   docker compose -f docker-compose.prod.yml exec agent \
#     sh -c "DB_BACKEND=postgres DATABASE_URL=$DATABASE_URL python data/init_db.py && \
#            DB_BACKEND=postgres DATABASE_URL=$DATABASE_URL python data/seed_scenario1.py"
#
# Kiểm tra:
#   curl http://localhost:8080/health
#   curl http://localhost:8080/health/ready

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: investigation
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d investigation"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  agent:
    image: ${AGENT_IMAGE:-investigation-agent:latest}
    ports:
      - "8080:8080"
    env_file:
      - .env.prod
    environment:
      PORT: "8080"
      DB_BACKEND: postgres
      # DATABASE_URL đọc từ .env.prod — ví dụ:
      # DATABASE_URL: postgresql://agent:${POSTGRES_PASSWORD}@postgres:5432/investigation
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  pgdata_prod:
